name.English=The Four Day Broadcast (v1.1)
name.Spanish=Cuatro días en el aire
name.French=Quatre Jours sur les Ondes
synopsys.English=A dinner party takes a sinister turn, when eyeless monsters surround the house, trapping you inside.
synopsys.Spanish=Una cena toma un giro siniestro cuando monstruos sin ojos rodean la casa y os retienen en ella.
synopsys.French=Un dîner prend une tournure sinistre lorsque des monstres sans visage entourent la maison, vous piégeant à l'intérieur.
description.English=What should have been a pleasant evening with friends and colleagues, at the Defoe Mansion, takes a turn for the sinister, when a curse is triggered, summoning eyeless ghouls around the house, who will enter in as little as four days, killing everyone inside. \n\n Six people are trapped in the mansions with you. Are you all inocent victims, or does the foe who trapped you here, hide among you? Search the house, study your fellow captives, and keep your wits about you, lest the Four Day Broadcast, tell a tale, of your demise. \n\n This is a scripted, mystery scenario, as such, replay value is limited. Please bear in mind, when planning your first game. \n\n <b>Trigger Warning:</b> This scenario contains references to suicide.
description.Spanish=Lo que debería haber sido una agradable velada con amigos y colegas en la mansión Defoe da un giro siniestro cuando se activa una maldición que invoca a unos demonios sin ojos que rondan la casa y que entrarán en tan solo cuatro días matando a todos los que estén dentro. \n Seis personas están atrapadas en las mansiones contigo. \n\n ¿Sois todos víctimas inocentes o el enemigo que os atrapó aquí se esconde entre vosotros? \n\n Inspecciona la casa, estudia a tus compañeros cautivos y mantente alerta, no vaya a ser que el relato de los cuatro días cuente únicamente la historia de cómo desaparecisteis todos. \n--------------------------------------------------\n <b>Nota</b>: Si juegas este escenario por primera vez, ten en cuenta que es una historia de misterio que sigue un guión fijo, por lo que no variará al jugarla de nuevo. \n---------------------------------------------------\n <b>Advertencia de contenido:</b> Este escenario contiene referencias al suicidio.\n---------------------------------------------------\nTamaño máximo del mapa: 3x3.5 tableros cuadrados.
description.French=Ce qui aurait dû être une agréable soirée entre amis et collègues au manoir Defoe prend une tournure sinistre lorsqu'une malédiction est déclenchée, invoquant des goules sans yeux autour de la maison. Elles y pénétreront dans à peine quatre jours, tuant tous ceux qui s'y trouvent. \n\n Six personnes sont piégées dans le manoir avec vous. Êtes-vous tous d'innocentes victimes, ou l'ennemi qui vous a piégés ici se cache-t-il parmi vous ? Fouillez la maison, étudiez vos compagnons de captivité et gardez votre sang-froid, de peur que la Diffusion de Quatre Jours ne raconte le récit de votre propre fin. \n\n Ceci est un scénario de mystère scripté ; à ce titre, sa rejouabilité est limitée. Veuillez en tenir compte lors de la planification de votre première partie. \n\n <b>Avertissement :</b> Ce scénario contient des références au suicide.
