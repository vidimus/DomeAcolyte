description.Spanish=Dominando Arkham, desde lo alto de una seca y desolada colina, se encuentra la mansión Sutcliffe. La que una vez fue una poderosa e influyente familia de Arkham, los Sutcliffe, ahora está sumida en la ruina y el olvido. Entre el puñado de personas que aún recuerda a la familia está vuestro grupo de investigadores, que habéis sido contratados para investigar la casa. \n\n Investiga una espeluznante mansión de cuyos residentes hace tiempo que no se sabe nada.\n---------------------------------------------------\nEl tamaño máximo del mapa: 3.5 x 3.5 tableros cuadrados.\nRequiere las siguientes expansiones:\n- Más allá del umbral.\n- Alquimia prohibida (o Recuerdos reprimidos). \n- La senda de la serpiente.\nv1.25\n---------------------------------------------------\n <b>Notas de los traductores: \n Contiene descripciones o situaciones que pueden no ser aptas para menores de 14 (recordatorio: la edad recomendada del juego "Mansiones de la locura" es +14 años) </b>
