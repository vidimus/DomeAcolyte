description.Spanish=Tras sobrevivir al naufragio del RMS Morgana, un grupo de estudiantes regresa a la Universidad de Miskatonic sólo para descubrir que hay más Híbridos de Profundo al acecho. \n\nEsta vez no habrá ningún bote salvavidas en el que escapar. \n\nEl equipo debe identificar y localizar a los impostores antes de que los Profundos destruyan Arkham persiguiendo a los investigadores.
description.Polish=Po przetrwaniu katastrofy RMS Morgana grupa uczonych powraca na Uniwersytet Miskatonic tylko po to, by odkryć, że więcej Hybryd czai się pośród nich. Tym razem nie będzie żadnej łodzi ratunkowej, która mogłaby ich ocalić.
