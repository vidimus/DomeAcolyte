synopsys.English=Your month-long investigation has led you to the lost temple of Azathoth, and your missing colleague
synopsys.Spanish=La investigación que has llevado a cabo durante un mes para encontrar a tu colega desaparecido te ha llevado al templo perdido de Azathoth.
synopsys.Russian=Ваше месячное расследование привело вас в затерянный храм Азатота к вашему пропавшему коллеге.
description.English=One of the Investigators went missing several months ago, before turning up, in a remote temple, devoted to Azathoth, the Outer God, their kidnappers dead at their feet, and their memories gone. It soon becomes apparent that something sinister lurks inside them, and they must be treated, before their monstrous parasite is set loose upon the world.
description.Spanish=\n Uno de los Investigadores desapareció hace varios meses, apareciendo después en un templo remoto, dedicado a Azathoth, el Dios Exterior, con sus secuestradores muertos a sus pies, y sin ningún recuerdo reciente. Pronto se hace evidente que algo siniestro acecha en su interior y que debe ser tratado, antes de que su monstruoso parásito sea liberado en el mundo. 
description.Russian=Один из сыщиков пропал несколько месяцев назад, а затем объявился в отдаленном храме, посвященном Азатоту, Внешнему Богу. Его похитители были мертвы у его ног, а воспоминания исчезли. Вскоре становится очевидно, что внутри него скрывается нечто зловещее, и его необходимо вылечить, прежде чем чудовищный паразит вырвется на свободу.
