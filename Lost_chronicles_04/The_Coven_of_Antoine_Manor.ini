synopsys.English=Your only hope of escaping the witch's lair is to identify your captor, among your fellow capives.
synopsys.Spanish=Tu única esperanza de escapar de la guarida de la bruja es identificar a tu captor, que está entre tus compañeros de cautiverio.
synopsys.French=Votre seul espoir de vous échapper du repaire de la sorcière est d'identifier votre ravisseur, qui se trouve parmi vos compagnons de captivité.
description.English=While searching for missing people in Arkham, you stumble upon a sinister, abandoned mansion, your Investigation of which has barely begun, when you are struck from behind, and wake up locked up in a basement. You've been captured by a witch with a sinister agenda, and if you're to escape, you'll have to band together with her other victims. Just be careful not to confuse a fellow captive, for the murderous witch herself.
description.Spanish=En vuestra búsqueda de personas desaparecidas en Arkham, dais con una mansión abandonada y siniestra. Justo cuando vuestra investigación empieza, os golpean por detrás. Al despertar, os encontráis encerrados en un sótano. Habéis sido capturados por una bruja con intenciones de lo más siniestras. Si queréis escapar, tendréis que colaborar con las otras víctimas, pero tened cuidado... no vayáis a confundir a uno de vuestros compañeros rehenes con la propia bruja asesina.\n------------------------------------------------------------------\nTamaño máximo del mapa: 4x4 tableros cuadrados.
description.French=À la recherche de personnes disparues à Arkham, vous tombez sur un manoir abandonné et sinistre. Juste au moment où votre enquête commence, on vous frappe par-derrière. À votre réveil, vous vous retrouvez enfermés dans un sous-sol. Vous avez été capturés par une sorcière aux intentions des plus sinistres. Si vous voulez vous échapper, vous devrez collaborer avec les autres victimes, mais soyez prudents... n'allez pas confondre l'un de vos compagnons d'infortune avec la sorcière meurtrière elle-même.
